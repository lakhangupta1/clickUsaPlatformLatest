<div class="container mt-4">

  <h4 class="mb-3">Campaign List</h4>

  <!-- FILTER -->
  <div class="card p-3 mb-3">
    <div class="row g-2">

      <div class="col-md-2">
        <input class="form-control"
               placeholder="Campaign Id"
               [(ngModel)]="filter.id">
      </div>

      <div class="col-md-2">
        <input class="form-control"
               placeholder="Campaign Name"
               [(ngModel)]="filter.name">
      </div>

      <div class="col-md-2">
        <select class="form-control" [(ngModel)]="filter.status">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="paused">Paused</option>
        </select>
      </div>

      <div class="col-md-2">
        <input type="date" class="form-control"
               [(ngModel)]="filter.start_date">
      </div>

      <div class="col-md-2">
        <input type="date" class="form-control"
               [(ngModel)]="filter.end_date">
      </div>

      <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-primary w-100" (click)="applyFilter()">
          Apply
        </button>
        <button class="btn btn-secondary w-100" (click)="resetFilter()">
          Reset
        </button>
      </div>

    </div>
  </div>

  <!-- PAGE LIMIT -->
  <div class="d-flex justify-content-between align-items-center mb-2">

    <div>
      <label class="me-2">Show</label>

      <select class="form-select d-inline w-auto"
              [(ngModel)]="limit"
              (change)="changeLimit()">
        <option [ngValue]="5">5</option>
        <option [ngValue]="10">10</option>
        <option [ngValue]="20">20</option>
        <option [ngValue]="50">50</option>
      </select>

      <span class="ms-2">entries</span>
    </div>

    <div>
      Total Campaign {{ offerCount }}
    </div>

  </div>

  <!-- TABLE -->
  <div class="card p-3">

    <!-- LOADER -->
    <div *ngIf="loading" class="text-center py-4">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2">Loading campaigns...</p>
    </div>

    <!-- TABLE -->
    <table *ngIf="!loading" class="table table-hover align-middle">

      <thead class="text-primary">
        <tr>
          <th>#</th>
          <th>Campaign</th>
          <th>Destination</th>
          <th>Vertical</th>
          <th>OS</th>
          <th>CPC</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let c of campaigns || []">

          <td>{{ c.index }}</td>

          <td>
            <a [routerLink]="['/offers/campaign-details', c._id]"
               class="fw-bold text-primary">
              {{ c.camp_name }}
            </a>
            <div class="text-muted small">({{ c._id }})</div>
          </td>

          <td>{{ c.destination_url }}</td>
          <td>{{ c.vartical }}</td>
          <td>{{ c.os }}</td>
          <td>{{ c.cpc }}</td>

          <td>
            <span class="badge"
                  [ngClass]="c.status === 'active' ? 'bg-success' : 'bg-secondary'">
              {{ c.status }}
            </span>
          </td>

        </tr>

        <tr *ngIf="campaigns.length === 0">
          <td colspan="7" class="text-center text-muted py-3">
            No campaigns found
          </td>
        </tr>

      </tbody>

    </table>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-center mt-3">

      <ngb-pagination
        *ngIf="offerCount > limit"
        [collectionSize]="offerCount"
        [(page)]="page"
        [pageSize]="limit"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="getPage($event)">
      </ngb-pagination>

    </div>

  </div>

</div>
