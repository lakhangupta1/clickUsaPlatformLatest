<div class="auth-wrapper d-flex no-block justify-content-center align-items-center"
    style="background-repeat: no-repeat; background-position: center center;">
    <div class="auth-box m-3 m-md-0">
        <div id="loginform">
            <!-- <div class="text-center">
                <span class="db"><img class="rounded-circle" [src]="logo" alt="logo"
                        style="height: 70px; width: 70px;" /></span>
                <h5 class="font-medium mb-4">Sign In to Admin</h5>
            </div> -->
            <div class="text-center">
                <div class="rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto"
                    style="height:100px;width:100px;">
                    <img [src]="'assets/images/logos/' + logo" alt="logo" class="img-fluid"
                        style="max-height:90px; max-width:90px; object-fit:contain; border-radius: 50%;">
                </div>
                <h5 class="font-medium mb-4 mt-3">Sign Up to Admin</h5>
            </div>
            <!-- Form -->
            <div class="row">
                <div class="col-12">
                    <form class="form-horizontal mt-3" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                        <div class="input-group mb-2">
                            <span class="input-group-text" id="basic-addon1">
                                <i class="ti-user"></i>
                            </span>
                            <input type="text" class="form-control" placeholder="Email" formControlName="email"
                                aria-label="Username" aria-describedby="basic-addon1"
                                [ngClass]="{'is-invalid': isLoginFormSubmitted && loginForm.get('email').errors, 'is-valid': !loginForm.get('email').errors}">
                        </div>
                        <div class="text-danger" *ngIf="loginForm.controls['email'].touched">
                            <span *ngIf="loginForm.controls['email'].errors?.['required']">Please enter
                                Email.</span>
                            <span *ngIf="loginForm.controls['email'].errors?.['email']">Please enter a valid
                                Email.</span>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text" id="basic-addon2">
                                <i class="ti-pencil"></i>
                            </span>
                            <input [type]="showPassword ? 'text' : 'password'" class="form-control"
                                formControlName="password" placeholder="Password" aria-label="Password"
                                aria-describedby="basic-addon1"
                                [ngClass]="{'is-invalid': isLoginFormSubmitted && loginForm.get('password').errors, 'is-valid': !loginForm.get('password').errors}">
                            <span class="input-group-text" style="cursor: pointer;"
                                (click)="showPassword = !showPassword">
                                <i class="{{ showPassword ? 'fas fa-eye-slash' : 'fas fa-eye' }}"></i>
                            </span>

                        </div>
                        <div class="text-danger"
                            *ngIf="loginForm.controls['password'].touched && loginForm.controls['password'].errors?.['required']">
                            <span>Please enter password.</span>
                        </div>

                        <div class="form-group row">
                            <div class="col-md-12">
                                <div class="form-check d-flex">
                                    <input type="checkbox" class="form-check-input" id="customCheck1"
                                        formControlName="termsConditions">
                                    <label class="form-check-label fs-3 ms-2" for="customCheck1">Accept <a
                                            href="javascript:void(0)">Terms & Conditions</a></label>
                                    <!-- <a  href="javascript:void(0)" id="to-recover"
                                        class="text-dark fs-3 ms-auto"><i class="fa fa-lock me-2"></i> Forgot pwd?</a> -->
                                </div>
                            </div>
                        </div>
                        <div class="form-group text-center mt-3">
                            <div class="col-xs-12">
                                <button type="submit" class=" w-100 btn btn-info"
                                    [ngClass]="{ disabled: loginForm.get('termsConditions').errors }"
                                    [disabled]="loginForm.invalid">Log In</button>
                            </div>
                        </div>

                        <div class="form-group mb-0 mt-2">
                            <div class="col-sm-12 text-center">
                                Don't have an account? <a [routerLink]="['/signup']" class="text-info ms-1"><b>Sign Up</b></a>
                            </div>
                        </div>
                    </form>
                    <!-- <p>{{logindata | json}}</p> -->
                </div>
            </div>
        </div>
        <div id="recoverform">
            <div class="logo">
                <span class="db"><img src="assets/images/logo-icon.png" alt="logo" /></span>
                <h5 class="font-medium mb-4">Recover Password</h5>
                <span>Enter your Email and instructions will be sent to you!</span>
            </div>
            <div class="row mt-3">
                <!-- Form -->
                <form class="col-12">
                    <!-- email -->
                    <div class="form-group row">
                        <div class="col-12">
                            <input class="form-control form-control-lg" type="email" required="" placeholder="Username">
                        </div>
                    </div>
                    <!-- pwd -->
                    <div class="row mt-3">
                        <div class="col-12">
                            <button class="btn d-block w-100 btn-lg btn-danger" type="submit"
                                name="action">Reset</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
