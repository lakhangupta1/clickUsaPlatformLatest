<div class="auth-wrapper d-flex no-block justify-content-end align-items-center"
     style="background:url(assets/images/background/sign-up.jpg); background-repeat:no-repeat; background-size:contain; background-attachment:fixed;">

  <div class="auth-box m-3 m-md-0" style="width:65%;">
    <div>

      <!-- LOGO -->
      <div class="text-center">
        <div class="rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto"
             style="height:100px;width:100px;">
          <img [src]="'assets/images/logos/' + logo"
               class="img-fluid rounded-circle"
               style="max-height:90px; max-width:90px;">
        </div>
        <h5 class="mt-3 mb-4">Sign Up</h5>
      </div>

      <!-- FORM -->
      <form [formGroup]="publisherRegisterForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">

          <!-- Company -->
          <div class="col-md-6">
            <label class="form-label">Company Name *</label>
            <input type="text" class="form-control"
                   formControlName="company"
                   [class.is-invalid]="isInvalid('company')" />
            <div class="invalid-feedback" *ngIf="isInvalid('company')">
              Company name is required
            </div>
          </div>

          <!-- First Name -->
          <div class="col-md-6">
            <label class="form-label">First Name *</label>
            <input type="text" class="form-control"
                   formControlName="first_name"
                   [class.is-invalid]="isInvalid('first_name')" />
            <div class="invalid-feedback" *ngIf="isInvalid('first_name')">
              First name is required
            </div>
          </div>

          <!-- Last Name -->
          <div class="col-md-6">
            <label class="form-label">Last Name *</label>
            <input type="text" class="form-control"
                   formControlName="last_name"
                   [class.is-invalid]="isInvalid('last_name')" />
            <div class="invalid-feedback" *ngIf="isInvalid('last_name')">
              Last name is required
            </div>
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control"
                   formControlName="email"
                   [class.is-invalid]="isInvalid('email')" />

            <!-- ✅ ENABLE VALIDATION -->
            <div class="invalid-feedback" *ngIf="isInvalid('email')">
              <div *ngIf="publisherRegisterForm.get('email')?.errors?.['required']">
                Email is required
              </div>
              <div *ngIf="publisherRegisterForm.get('email')?.errors?.['email']">
                Invalid email format
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Country *</label>

            <select class="form-control"
                    formControlName="country"
                    [class.is-invalid]="isInvalid('country')">

              <option value="">Select Country</option>

              <option *ngFor="let c of countryList" [value]="c.key">
                {{ c.value }} ({{ c.key }})
              </option>

            </select>

            <div class="invalid-feedback" *ngIf="isInvalid('country')">
              Country is required
            </div>
          </div>
          <!-- Phone -->
          <div class="col-md-6">
            <label class="form-label">Phone *</label>
            <input type="text" class="form-control"
                   maxlength="10"
                   formControlName="phone"
                   [class.is-invalid]="isInvalid('phone')" />
            <div class="invalid-feedback" *ngIf="isInvalid('phone')">
              Enter valid 10-digit number
            </div>
          </div>

          <!-- Password -->
          <div class="col-md-6">
            <label class="form-label">Password *</label>
            <input type="password" class="form-control"
                   formControlName="password"
                   [class.is-invalid]="isInvalid('password')" />

            <!-- ✅ ENABLE VALIDATION -->
            <div class="invalid-feedback" *ngIf="isInvalid('password')">
              <div *ngIf="publisherRegisterForm.get('password')?.errors?.['required']">
                Password required
              </div>
              <div *ngIf="publisherRegisterForm.get('password')?.errors?.['minlength']">
                Minimum 8 characters required
              </div>
            </div>
          </div>

          <!-- Submit -->
          <div class="col-md-12 text-center">
            <button type="submit"
                    class="btn btn-info w-100 mt-3"
                    [disabled]="publisherRegisterForm.invalid || isSubmitting">
              {{ isSubmitting ? 'Processing...' : 'SIGN UP' }}
            </button>
          </div>

          <!-- Login -->
          <div class="col-md-12 text-center mt-2">
            Already have an account?
            <a routerLink="/login" class="text-info ms-1"><b>Sign In</b></a>
          </div>

        </div>
      </form>

    </div>
  </div>
</div>



<!-- ✅ OTP MODAL -->
<ng-template #otpModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Verify OTP</h5>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>

  <div class="modal-body text-center">
    <p>Enter OTP sent to your email/phone</p>

    <!-- ✅ IMPROVED INPUT -->
    <input type="text"
           class="form-control text-center"
           maxlength="6"
           [(ngModel)]="otp"
           placeholder="Enter OTP"
           style="font-size:18px; letter-spacing:5px;" />
  </div>

  <div class="modal-footer">
    <button class="btn btn-secondary" (click)="modal.dismiss()">Cancel</button>

    <button class="btn btn-success"
          [disabled]="otp.length !== 6 || isVerifying"
          (click)="verifyOtpHandler(modal)">
    {{ isVerifying ? 'Verifying...' : 'Verify OTP' }}
  </button>
  </div>
</ng-template>
