<div class="card p-3">
  <form (ngSubmit)="showUserId()">

    <div class="row g-3 align-items-end">

      <!-- COMPANY -->
      <div class="col-md-3 col-sm-12">
        <ng-select
          class="w-100"
          name="company"
          [items]="allUsers"
          bindLabel="company"
          bindValue="_id"
          [(ngModel)]="companyUserId"
          placeholder="Select company"
          [searchable]="true"
          [clearable]="!!companyUserId">
        </ng-select>
      </div>

      <!-- EMAIL -->
      <div class="col-md-3 col-sm-12">
        <ng-select
          class="w-100"
          name="email"
          [items]="allUsers"
          bindLabel="email"
          bindValue="_id"
          [(ngModel)]="emailUserId"
          placeholder="Select email"
          [searchable]="true"
          [clearable]="!!emailUserId">
        </ng-select>
      </div>

      <!-- MANUAL INPUT -->
      <div class="col-md-3 col-sm-12">
        <input
          type="text"
          class="form-control"
          [(ngModel)]="manualUserId"
          name="manualUserId"
          placeholder="Enter User ID">
      </div>

      <!-- STATUS -->
      <div class="col-md-3 col-sm-12">
        <select class="form-select" name="status" [(ngModel)]="status">
          <option value="">Select Status</option>
          <option value="active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>

      <!-- LIMIT -->
      <div class="col-md-3 col-sm-12">
        <select class="form-select" name="limit" [(ngModel)]="limit">
          <option [ngValue]="10">10</option>
          <option [ngValue]="50">50</option>
          <option [ngValue]="100">100</option>
          <option [ngValue]="200">200</option>
          <option [ngValue]="500">500</option>
        </select>
      </div>

      <!-- BUTTONS -->
      <div class="col-12 d-flex gap-2 mt-2">
        <button type="submit" (click)="onFilter()" class="btn btn-primary">
          Filter
        </button>

        <button type="button" (click)="reset()" class="btn btn-warning">
          Reset
        </button>

        <button type="button" (click)="showUserId()" routerLink="/user/edit" class="btn btn-secondary">
          Add new User
        </button>
      </div>

    </div>
  </form>
</div>
<div>Total Users : {{ userCount }}</div>
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover text-center">
            <thead>
                <tr>            
                    <th>Serial No</th>
                    <th>Company Name</th>
                    <th>User Name</th>
                    <th>User Email</th>
                    <th>Country</th>
                    <th>Status</th>
                    <th>Action</th>              
                </tr>
            </thead>
            <tbody>
                @for(record of companyName; track record._id; let i = $index){
                    <tr>
                        <td class="align-middle text-center">
                            <div class="d-flex justify-content-center align-items-center gap-2">
                                <span>{{ i + 1 }}</span>
                                <!-- <div class="form-check mb-0">
                                    <input
                                     // update to do checkbox
                                    />
                                </div> -->

                            </div>
                        </td>
                        <td>{{ record.company }}</td>
                        <td>{{ record.first_name }}</td>
                        <td>{{ record.email }}</td>
                        <td>{{ record.country }}</td>
                        <td>
                            <span class="badge" [ngClass]="{ 'bg-success': record.status === 'active', 'bg-danger': record.status === 'Inactive' }">
                                {{ record.status }}
                            </span>
                        </td>
                        <td class="text-center">
                        <!-- Edit -->
                        <a href="javascript:void(0)" class="me-2" routerLink="/user/edit/{{record._id}}">
                          <i class="fa fa-edit text-primary cursor-pointer" ngbTooltip="Edit" placement="bottom"> </i>
                        </a>

                        <!-- View -->
                        <a href="javascript:void(0)" routerLink="/user/details/{{record._id}}" class="me-2">
                          <i class="fas fa-eye text-success cursor-pointer" ngbTooltip="View Details" placement="bottom"> </i>
                        </a>
                        <a href="javascript:void(0)">
                          <i class="fa fa-trash" ngbTooltip="Delete"></i>
                        </a>
                      </td>
                    </tr>
                }
                <tr *ngIf="companyName.length === 0">
                    <td colspan="7" class="text-center text-muted py-3">
                        No User found
                    </td>
                </tr>
            </tbody>            
        </table>
        <!-- PAGINATION -->
    <div class="d-flex justify-content-center mt-3">

      <ngb-pagination
        *ngIf="userCount > limit"
        [collectionSize]="userCount"
        [(page)]="page"
        [pageSize]="limit"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="getPage($event)">
      </ngb-pagination>

    </div>
    </div>
</div>
