<ng-multiselect-dropdown name="customMultiSelectDropDown" [placeholder]="dropdownPlaceholder" [settings]="settings"
    [data]="dropdownData" [(ngModel)]="selectedData" [disabled]="dropdownDisabled" (onSelect)="onItemSelect($event)"
    (onSelectAll)="onSelectAll($event)" (onDeSelect)="onItemDeSelect($event)" (onDeSelectAll)="onDeSelectAll($event)">
</ng-multiselect-dropdown>
