<ng-scrollbar class="customizer-body custom-pills">
  <ul ngbNav #nav="ngbNav" [(activeId)]="active" class="nav-pills nav-justified custom-tab border-bottom">
    <li [ngbNavItem]="1">
      <a ngbNavLink class="d-flex flex-column gap-2 justify-content-center text-center">
        <!-- <i-feather class="feather-sm m-auto" name="airplay"></i-feather> -->
        <span class="fs-3">Settings</span>
      </a>
      <ng-template ngbNavContent>
        <div class="p-3 border-bottom">
          <h4 class="fw-semibold fs-4 mb-2">Theme</h4>
          <div class="d-flex flex-row gap-3 customizer-box" role="group">
            <input type="radio" class="btn-check light-layout" id="theme_light" name="set_theme" autocomplete="off"
              [attr.checked]="themeOptions.theme == 'light' ? 'checked' : null" (change)="
                themeOptions.theme =
                  themeOptions.theme == 'dark' ? 'light' : 'dark'
              " (click)="setBodyAttribute('data-bs-theme', 'light')" />
            <label class="btn p-9 btn-outline-primary rounded-2 d-flex align-items-center gap-2 fs-3 fw-medium"
              for="theme_light"><i name="sun" class="fa fa-sun-o icon fs-6 d-flex"></i>Light</label>

            <input type="radio" class="btn-check dark-layout" id="theme_dark" name="set_theme"
              [attr.checked]="themeOptions.theme == 'dark' ? 'checked' : null" (change)="
                themeOptions.theme =
                  themeOptions.theme == 'light' ? 'dark' : 'light'
              " (click)="setBodyAttribute('data-bs-theme', 'dark')" autocomplete="off" />
            <label class="btn p-9 btn-outline-primary rounded-2 d-flex align-items-center gap-2 fs-3 fw-medium"
              for="theme_dark"><i name="moon" class="fa fa-moon-o d-flex "></i>Dark</label>
          </div>

          <div class="d-flex flex-row gap-3 customizer-box" role="group">
            <input type="radio" class="btn-check light-layout" id="dir_ltr" name="set_dir" autocomplete="off"

            <input type="radio" class="btn-check" id="sidebar_collapse" name="set_sidebar_type"
              [(ngModel)]="themeOptions.sidebartype" [attr.checked]="
                  themeOptions.sidebartype == 'mini-sidebar' ? 'checked' : null

                  themeOptions.sidebartype =
                    themeOptions.sidebartype == 'mini-sidebar'
                      ? 'full'
                      : 'mini-sidebar'
                " />
            <label class="btn p-9 btn-outline-primary rounded-2 d-flex align-items-center gap-2 fs-3 fw-medium"
              for="sidebar_collapse">
              <!-- <i-tabler name="layout-sidebar"
                class="icon fs-6 d-flex"></i-tabler> -->
                Collapse</label>
          </div>
          }

          <h4 class="fw-semibold fs-4 mb-2 mt-5">Card With</h4>
          <div class="d-flex flex-row gap-3 customizer-box" role="group">
            <input type="radio" class="btn-check" id="card_border" name="set_card_setting" autocomplete="off"
              [attr.checked]="
                themeOptions.cardType == 'border' ? 'checked' : null
              " (change)="
                themeOptions.cardType =
                  themeOptions.cardType == 'border' ? 'shadow' : 'border'
              " />
            <label class="btn p-9 btn-outline-primary rounded-2 d-flex align-items-center gap-2 fs-3 fw-medium"
              for="card_border">
              <!-- <i-tabler name="border-all" class="icon fs-6 d-flex"></i-tabler> -->
              Border</label>

            <input type="radio" class="btn-check" id="card_shadow" name="set_card_setting" [attr.checked]="
                themeOptions.cardType == 'shadow' ? 'checked' : null
              " (change)="
                themeOptions.cardType =
                  themeOptions.cardType == 'shadow' ? 'border' : 'shadow'
              " />
            <label class="btn p-9 btn-outline-primary rounded-2 d-flex align-items-center gap-2 fs-3 fw-medium"
              for="card_shadow">
              <!-- <i-tabler name="border-none" class="icon fs-6 d-flex"></i-tabler> -->
              Shadow</label>
          </div>
        </div>
      </ng-template>
    </li>
