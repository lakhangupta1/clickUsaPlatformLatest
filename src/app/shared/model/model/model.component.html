<div class="modal-header">
    <h4 class="modal-title" id="modal-title">{{modal?.title}}</h4>
    <button type="button" class="close" aria-label="Close button" aria-describedby="modal-title" (click)="modalInstance.close('false')">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    {{modal?.body}}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="modalInstance.close('false')">Cancel</button>
    <button type="button" ngbAutofocus class="btn btn-danger" (click)="modalInstance.close('true')">Ok</button>
  </div>
