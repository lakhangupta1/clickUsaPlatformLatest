<ngb-datepicker #dp (dateSelect)="onDateSelection($event)" [displayMonths]="2" [dayTemplate]="t"
    outsideDays="hidden"></ngb-datepicker>

    <ng-template #t let-date let-focused="focused">
        <span class="custom-day" [class.focused]="focused" [class.range]="isRange(date)"
            [class.faded]="isHovered(date) || isInside(date)" (mouseenter)="hoveredDate = date"
            (mouseleave)="hoveredDate = null">
            {{ date.day }}
        </span>
    </ng-template>

    <div class="d-flex border rounded mt-1 p-2" >
        <ul class="list-group">
            <li class="list-group-item">Today</li>
            <li class="list-group-item">Yesterday</li>
            <li class="list-group-item">This Week</li>
            <li class="list-group-item">Last Week</li>
            <li class="list-group-item">This Month</li>
            <li class="list-group-item">Last Month</li>
            <li class="list-group-item">Custom Range</li>
        </ul>

        <div class="time-picker p-2">
            
            <ngb-timepicker [(ngModel)]="fromTime"></ngb-timepicker>
    
           
            <ngb-timepicker [(ngModel)]="toTime" ></ngb-timepicker>
        </div>
    </div>



<div class="selected-times">
    <p><strong>From Date:</strong> {{ formatDateTime(fromDate, fromTime) }}
        - {{ formatDateTime(toDate, toTime) }}</p>
</div>
